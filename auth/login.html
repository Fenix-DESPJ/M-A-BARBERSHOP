<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" type="image/x-icon" href="../assets/icons/logo.png">
    <link rel="stylesheet" href="../css/login.css"> 
    <title>M&A Barbershop</title>
</head>
<body class="login-page">
    <div class="main-card">
        <div class="header-msg">
            ¡Por favor inicie sesion antes de realizar alguna reserva!
        </div>
        
        <form action="../index.html" method="get" class="login-form">
            <div class="logo-container">
                <img src="../assets/icons/logo.png" alt="M&A Logo">
            </div>

            <div class="field">
                <label>Escriba su usuario (Teléfono)</label>
                <input type="tel" name="telefono" placeholder="teléfono:">
            </div>

            <div class="field">
                <label>Contraseña</label>
                <input type="password" name="password" placeholder="contraseña:">
            </div>

            <button type="submit" class="btn-submit">Iniciar sesion</button>

            <div class="footer-links">
                <p>¿No tiene cuenta? <a href="registrarse.html">Regístrese Aquí</a></p>
                <a href="../index.html" class="back-home">REGRESAR A INICIO!!!</a>
            </div>
        </form>
    </div>
</body>
</html>
