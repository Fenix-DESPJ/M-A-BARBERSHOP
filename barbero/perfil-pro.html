<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Perfil Profesional - M&A</title>
  <link rel="stylesheet" href="../css/perfil-pro.css">
</head>
<body>

  <header class="navbar">
    <div class="logo">
      <img src="../assets/icons/logo.png" alt="logo">
      <span>M&A</span>
    </div>

    <nav class="menu">
      <a href="../barbero/home.html">Inicio</a>
      <a href="../views/contacto.html">Contacto</a>
      <a href="../views/servicios.html">Servicios</a>
      <a href="../views/galeria.html">Galeria</a>
      <a href="../barbero/agenda.html">Agenda</a>
      <a href="../barbero/perfil.html" class="active">Perfil</a>
    </nav>

    <div class="bell">🔔</div>
  </header>

  <main class="reservas-page">
    <div class="top-lines">
      <div class="line"></div>
      <h1>Perfil Personal</h1>
      <div class="line"></div>
    </div>

    <section class="reservas-content">

      <aside class="sidebar" style="text-align: center;">
        <div class="profile-image-container">
          <img src="../assets/img/perfil-pro.jpg" alt="Foto de perfil" class="profile-img">
        </div>
        <button class="btn-reservar" style="margin-top: 15px; background-color: #333; color: white;">Cambiar Foto</button>
        
        <div style="margin-top: 25px; text-align: left;">
            <label style="color: #cfa94b; font-weight: bold; font-size: 0.8rem;">ROL POR DEFECTO</label>
            <p style="color: white; font-weight: bold;">Barbero</p>
        </div>
      </aside>

      <section class="schedule-box">
        <form class="booking-form">
          <div class="form-group">
            <label for="nombre">Nombre:</label>
            <input type="text" id="nombre" value="Juan Pablo Echeverry">
          </div>

          <div class="form-group">
            <label for="edad">Edad:</label>
            <input type="number" id="edad" value="28">
          </div>

          <div class="form-group">
            <label for="telefono">Número de teléfono:</label>
            <input type="tel" id="telefono" value="321756985">
          </div>

          <div class="form-group">
            <label for="password">Contraseña:</label>
            <input type="password" id="password" value="********">
            <a href="#" style="color: #cfa94b; font-size: 0.8rem; text-decoration: none;">¿Desea cambiar su contraseña?</a>
          </div>

          <div style="display: flex; gap: 15px; margin-top: 20px;">
            <button type="button" class="btn-reservar" style="background-color: #444; color: white;">Editar</button>
            <button type="submit" class="btn-reservar">Guardar</button>
          </div>
        </form>

        <hr style="border: 0.5px solid #333; margin: 30px 0;">
        
        <button class="btn-delete">Eliminar cuenta</button>
      </section>

    </section>

    <div class="back-container">
      <a href="../index.html" class="btn-back">Regresar</a>
    </div>
  </main>

</body>
</html>
